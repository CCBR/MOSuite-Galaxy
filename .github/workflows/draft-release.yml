name: draft-release

on:
  workflow_dispatch:
    inputs:
      version-tag:
        description: |
          Semantic version tag for next release.
          If not provided, it will be determined based on conventional commit history.
          Example: v2.5.11
        required: false
        type: string
        default: ""

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required to include tags
      - uses: CCBR/actions/draft-release@main
        with:
          github-token: ${{ github.token }}
          version-tag: ${{ github.event.inputs.version-tag }}
          ccbr-actions-version: main
      - name: trigger auto-format on release-draft branch
        uses: actions/github-script@v6
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-format.yml',
              ref: 'release-draft'
            })
